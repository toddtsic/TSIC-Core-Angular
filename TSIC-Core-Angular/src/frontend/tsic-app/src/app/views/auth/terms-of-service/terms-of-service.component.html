<div class="tos-page">

    <!-- Header card -->
    <div class="tos-header-card">
        <h2 class="tos-title">Terms of Service</h2>
        <span class="tos-updated">
            <i class="bi bi-calendar-event"></i>
            Updated December 31, 2025
        </span>
    </div>

    <!-- Document card -->
    <div class="tos-card">
        <div class="tos-scroll">
            <app-tos-content />
        </div>
    </div>

    <!-- Acceptance card — visually separate -->
    <div class="tos-accept-card">
        @if (error()) {
        <div class="alert alert-danger d-flex align-items-start mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2 mt-1"></i>
            <span>{{ error() }}</span>
        </div>
        }

        <label class="tos-checkbox" for="tosAccept">
            <input type="checkbox" id="tosAccept" [checked]="accepted()"
                (change)="accepted.set(!accepted())" [disabled]="submitting()">
            <span>I have read and agree to the <strong>Terms of Service</strong></span>
        </label>

        <button type="button" class="btn btn-primary btn-lg w-100 tos-submit"
            [disabled]="!accepted() || submitting()" (click)="onAccept()">
            @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            <span>Accepting...</span>
            } @else {
            <span>Accept and Continue</span>
            }
        </button>
    </div>

</div>
