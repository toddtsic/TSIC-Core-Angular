<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="page-header">
                <h2 class="page-title">Adult Form Designer</h2>
                <div class="page-header-actions">
                    <div class="btn-group btn-group-sm" aria-label="Page actions">
                        <a [routerLink]="['/', jobPath(), 'home']" class="btn btn-outline-secondary"
                            title="Go to job home" aria-label="Go to job home">
                            <i class="bi bi-house-door me-1"></i>
                            <span>Home</span>
                        </a>
                        <a [routerLink]="['/', jobPath(), 'tools', 'profile-editor']" class="btn btn-outline-primary"
                            title="Player form designer" aria-label="Player form designer">
                            <i class="bi bi-person-vcard me-1"></i>
                            <span class="d-none d-sm-inline">Player Designer</span>
                            <span class="d-inline d-sm-none">Player</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Messages -->
    @if (errorMessage()) {
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        {{ errorMessage() }}
        <button type="button" class="btn-close" (click)="errorMessage.set(null)"></button>
    </div>
    }

    @if (successMessage()) {
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        {{ successMessage() }}
        <button type="button" class="btn-close" (click)="successMessage.set(null)"></button>
    </div>
    }

    <!-- Role tabs -->
    <ul class="nav nav-tabs mb-3">
        @for (tab of roleTabs; track tab.key) {
        <li class="nav-item">
            <button class="nav-link" [class.active]="activeRole() === tab.key" (click)="selectRole(tab.key)"
                [disabled]="isSaving()">
                <i class="bi bi-person-badge me-1"></i> {{ tab.label }}
            </button>
        </li>
        }
    </ul>

    <!-- Loading Spinner -->
    @if (isLoading()) {
    <div class="text-center py-5">
        <div class="spinner-border text-primary">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading adult form metadata...</p>
    </div>
    } @else {
    <app-field-set-editor [fields]="activeFields()" [allowedFields]="adultAllowedFields" [disabled]="isSaving()"
        [scopeLabel]="activeRoleLabel()"
        [headerNote]="'These fields apply to the ' + activeRoleLabel() + ' registration form for THIS job only.'"
        [removeWarning]="'Remove this field from the ' + activeRoleLabel() + ' form for this job? This updates AdultProfileMetadataJson for this job only.'"
        [testResult]="testResult()" [testing]="isTesting()" (fieldsChange)="onActiveFieldsChange($event)"
        (validationTest)="onValidationTest($event)"></app-field-set-editor>
    }
</div>
