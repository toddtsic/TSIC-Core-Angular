@if (ready()) {
<div class="store-login-container">
	<!-- Hero -->
	<div class="text-center store-login-hero">
		<i class="bi bi-shop store-login-icon"></i>
		<h2 class="store-login-title">Event Store</h2>
		<p class="store-login-subtitle">Sign in with your family account to shop</p>
	</div>

	<!-- Two-card layout (or single card when walk-up is disabled) -->
	<div class="row g-3 align-items-stretch justify-content-center">
		<!-- Left: embedded family login -->
		<div class="d-flex store-card-col" [class]="allowWalkup() ? 'col-12 col-md-6' : 'col-12 col-md-8'">
			<app-login class="flex-fill"
				[theme]="'family'"
				[embedded]="true"
				[headerText]="'Family Sign In'"
				[subHeaderText]="'Already registered? Use your family credentials'"
				[returnUrl]="storeReturnUrl()"
				(loginSuccess)="onLoginSuccess()" />
		</div>

		<!-- Right: guest walk-up option (only when allowed) -->
		@if (allowWalkup()) {
		<div class="col-12 col-md-6 d-flex store-card-col">
			<div class="card border rounded flex-fill guest-card">
				<div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
					<i class="bi bi-person-plus guest-card-icon"></i>
					<h5 class="fw-bold mb-2">No Account?</h5>
					<p class="guest-card-text">
						You can still shop without an account.
					</p>
					<a routerLink="../walk-up" class="btn btn-outline-primary">
						<i class="bi bi-arrow-right-circle me-2"></i>Continue as Guest
					</a>
				</div>
			</div>
		</div>
		}
	</div>
</div>
}
