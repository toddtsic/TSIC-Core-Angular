<app-wizard-shell
  [steps]="steps()"
  [currentIndex]="currentIndex()"
  [config]="shellConfig()"
  [canContinue]="canContinue()"
  [showContinue]="showContinue()"
  [continueLabel]="continueLabel()"
  (back)="back()"
  (continue)="next()"
  (goToStep)="goToStep($event)">

  @switch (currentStepId()) {
    @case ('account') {
      <app-adult-account-step (autoAdvance)="onAccountAutoAdvance()" />
    }
    @case ('role') {
      <app-adult-role-step [jobPath]="jobPath" />
    }
    @case ('profile') {
      <app-adult-profile-step />
    }
    @case ('waivers') {
      <app-adult-waivers-step />
    }
    @case ('review') {
      <app-adult-review-step />
    }
    @case ('payment') {
      <app-adult-payment-step />
    }
    @case ('confirmation') {
      <app-adult-confirmation-step (finished)="onFinishConfirmation()" />
    }
    @case ('tos') {
      <app-tos-acceptance-step
        [submitting]="tosSubmitting()"
        [error]="tosError()"
        (accepted)="onTosAccepted()" />
    }
    @default {
      <div class="alert alert-warning" role="note">
        Unknown step "{{ currentStepId() }}". Please go back and try again.
      </div>
    }
  }

</app-wizard-shell>
