<main class="wizard-shell" [wizardTheme]="config().theme"
      aria-labelledby="wz-title-mobile wz-title-desktop">

  <!-- Fixed header: title + step indicator + action bar -->
  <div class="wizard-header">

    <!-- Mobile: compact title + optional badge -->
    <div class="d-md-none text-center">
      <div class="d-flex align-items-center justify-content-center gap-2 flex-wrap">
        <h2 id="wz-title-mobile" class="wizard-title mb-0">{{ config().title }}</h2>
        @if (config().badge) {
        <span class="wizard-badge">{{ config().badge }}</span>
        }
      </div>
    </div>

    <!-- Desktop: full title + optional badge -->
    <div class="d-none d-md-block text-center">
      <h2 id="wz-title-desktop" class="wizard-title mb-0">{{ config().title }}</h2>
      @if (config().badge) {
      <div class="d-flex align-items-center justify-content-center mt-1">
        <span class="wizard-badge">{{ config().badge }}</span>
      </div>
      }
    </div>

    <!-- Step indicator -->
    <div class="wizard-steps">
      <app-step-indicator [steps]="stepDefinitions()" [currentIndex]="currentIndex()" />
    </div>

    <!-- Action bar (hidden on first step — first step has its own CTAs) -->
    @if (showActionBar()) {
    <app-wizard-action-bar
      [canBack]="currentIndex() > 0"
      [canContinue]="canContinue()"
      [continueLabel]="continueLabel()"
      [showContinue]="showContinue()"
      [detailsBadgeLabel]="detailsBadgeLabel()"
      [detailsBadgeClass]="detailsBadgeClass()"
      (back)="back.emit()"
      (continue)="continue.emit()" />
    }
  </div>

  <!-- Scrollable content -->
  <div class="wizard-content">
    <ng-content />
  </div>

</main>
