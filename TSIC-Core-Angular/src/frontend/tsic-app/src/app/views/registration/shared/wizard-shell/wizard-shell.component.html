<main class="wizard-shell" [wizardTheme]="config().theme"
      aria-labelledby="wz-title-mobile wz-title-desktop">

  <div class="wizard-header">

    <!-- Title row: Back | Title | Continue -->
    <div class="wizard-title-row">
      @if (showActionBar() && showBack() && currentIndex() > 0) {
      <button type="button" class="wz-nav-btn wz-back" (click)="back.emit()"
        aria-label="Go back to previous step">
        <i class="bi bi-chevron-left"></i> Back
      </button>
      } @else {
      <span class="wz-nav-spacer"></span>
      }

      <div class="wizard-title-center">
        <h2 class="wizard-title mb-0"
          [id]="'wz-title'"
          aria-labelledby="wz-title">{{ config().title }}</h2>
        @if (config().badge) {
        <div class="mt-2">
          <span class="wizard-badge">{{ config().badge }}</span>
        </div>
        }
      </div>

      @if (showActionBar() && showContinue()) {
      <button type="button" class="wz-nav-btn wz-continue"
        [disabled]="!canContinue()"
        (click)="continue.emit()"
        [attr.aria-label]="'Proceed: ' + continueLabel()">
        {{ continueLabel() }} <i class="bi bi-chevron-right"></i>
      </button>
      } @else {
      <span class="wz-nav-spacer"></span>
      }
    </div>

    <!-- Step indicator (hidden on first step — constraint type not yet known) -->
    @if (showActionBar()) {
    <div class="wizard-steps">
      <app-step-indicator [steps]="stepDefinitions()" [currentIndex]="currentIndex()" />
    </div>
    }
  </div>

  <!-- Scrollable content -->
  <div class="wizard-content">
    <ng-content />
  </div>

</main>
