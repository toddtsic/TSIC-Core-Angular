@if (svc.scheduling()) {
  <div class="tab-panel">
    <!-- Public access toggle — prominent placement -->
    <div class="form-section">
      <div class="toggle-row" [class.is-on]="bScheduleAllowPublicAccess()" [class.is-off]="!bScheduleAllowPublicAccess()">
        <label class="toggle-control">
          <input type="checkbox"
            [ngModel]="bScheduleAllowPublicAccess()"
            (ngModelChange)="bScheduleAllowPublicAccess.set($event); onFieldChange()" />
          <span class="field-label">Allow Public Schedule Access</span>
        </label>
        <span class="toggle-tip">
          @if (bScheduleAllowPublicAccess()) {
            The game schedule is visible to the public.
          } @else {
            The game schedule is hidden from the public.
          }
        </span>
      </div>
    </div>

    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-stopwatch me-2"></i>Event Dates &amp; Game Clock Parameters</h6>
      <div class="row g-2">
        <div class="col-md-3">
          <label class="field-label">Event Start Date</label>
          <input type="date" class="field-input"
            [ngModel]="eventStartDate()"
            (ngModelChange)="eventStartDate.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Event End Date</label>
          <input type="date" class="field-input"
            [ngModel]="eventEndDate()"
            (ngModelChange)="eventEndDate.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Half Minutes</label>
          <input type="number" class="field-input"
            [ngModel]="halfMinutes()"
            (ngModelChange)="halfMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Half Time Minutes</label>
          <input type="number" class="field-input"
            [ngModel]="halfTimeMinutes()"
            (ngModelChange)="halfTimeMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Transition Minutes</label>
          <input type="number" class="field-input"
            [ngModel]="transitionMinutes()"
            (ngModelChange)="transitionMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Playoff Minutes</label>
          <input type="number" class="field-input"
            [ngModel]="playoffMinutes()"
            (ngModelChange)="playoffMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Playoff Half Minutes</label>
          <input type="number" class="field-input"
            [ngModel]="playoffHalfMinutes()"
            (ngModelChange)="playoffHalfMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Playoff Half Time</label>
          <input type="number" class="field-input"
            [ngModel]="playoffHalfTimeMinutes()"
            (ngModelChange)="playoffHalfTimeMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Quarter Minutes</label>
          <input type="number" class="field-input"
            [ngModel]="quarterMinutes()"
            (ngModelChange)="quarterMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Quarter Time</label>
          <input type="number" class="field-input"
            [ngModel]="quarterTimeMinutes()"
            (ngModelChange)="quarterTimeMinutes.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">UTC Offset Hours</label>
          <input type="number" class="field-input"
            [ngModel]="utcOffsetHours()"
            (ngModelChange)="utcOffsetHours.set($event); onFieldChange()" />
        </div>
      </div>
    </div>

  </div>
}
