@if (svc.general(); as g) {
  <div class="tab-panel">

    <!-- Job Properties -->
    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-briefcase me-2"></i>Job Properties</h6>
      <div class="row g-2">
        <div class="col-md-3">
          <label class="field-label">Event Name</label>
          <input type="text" class="field-input"
            [ngModel]="jobName()"
            (ngModelChange)="jobName.set($event); onFieldChange()" />
        </div>
        <div class="col-md-3">
          <label class="field-label">Display Name</label>
          <input type="text" class="field-input"
            [ngModel]="displayName()"
            (ngModelChange)="displayName.set($event); onFieldChange()" />
        </div>
        <div class="col-md-2">
          <label class="field-label">Season</label>
          <input type="text" class="field-input"
            [ngModel]="season()"
            (ngModelChange)="season.set($event); onFieldChange()" />
        </div>
        <div class="col-md-2">
          <label class="field-label">Year</label>
          <input type="text" class="field-input"
            [ngModel]="year()"
            (ngModelChange)="year.set($event); onFieldChange()" />
        </div>
        <div class="col-md-2">
          <label class="field-label">User Expiry</label>
          <input type="date" class="field-input"
            [ngModel]="expiryUsers()"
            (ngModelChange)="expiryUsers.set($event); onFieldChange()" />
        </div>
      </div>
      <div class="row g-2 mt-1">
        <div class="col-md-3">
          <label class="field-label">Job ID</label>
          <input type="text" class="field-input" [value]="g.jobId" disabled />
        </div>
        <div class="col-md-3">
          <label class="field-label">Job Path</label>
          <input type="text" class="field-input" [value]="g.jobPath" disabled />
        </div>
        <div class="col-md-6">
          <label class="field-label">Description</label>
          <textarea class="field-input" rows="2"
            [ngModel]="jobDescription()"
            (ngModelChange)="jobDescription.set($event); onFieldChange()"></textarea>
        </div>
      </div>
    </div>

    <!-- 3. SuperUser Only -->
    @if (svc.isSuperUser()) {
      <div class="form-section form-section--super">
        <h6 class="section-title">
          <i class="bi bi-shield-lock me-2"></i>
          SuperUser Only
        </h6>
        <div class="row g-2">
          <div class="col-md-2">
            <label class="field-label">Admin Expiry</label>
            <input type="date" class="field-input"
              [ngModel]="expiryAdmin()"
              (ngModelChange)="expiryAdmin.set($event); onFieldChange()" />
          </div>
          <div class="col-md-2">
            <label class="field-label">Job Code</label>
            <input type="text" class="field-input"
              [ngModel]="jobCode()"
              (ngModelChange)="jobCode.set($event); onFieldChange()" />
          </div>
          <div class="col-md-2">
            <label class="field-label">QBP Name</label>
            <input type="text" class="field-input"
              [ngModel]="jobNameQbp()"
              (ngModelChange)="jobNameQbp.set($event); onFieldChange()" />
          </div>
          <div class="col-md-2">
            <label class="field-label">Sport</label>
            <select class="field-input field-select"
              [ngModel]="sportId()"
              (ngModelChange)="sportId.set($event); onFieldChange()">
              <option [ngValue]="null">— Select —</option>
              @for (s of svc.referenceData()?.sports ?? []; track s.sportId) {
                <option [ngValue]="s.sportId">{{ s.name }}</option>
              }
            </select>
          </div>
          <div class="col-md-2">
            <label class="field-label">Job Type</label>
            <select class="field-input field-select"
              [ngModel]="jobTypeId()"
              (ngModelChange)="jobTypeId.set($event); onFieldChange()">
              <option [ngValue]="undefined">— Select —</option>
              @for (jt of svc.referenceData()?.jobTypes ?? []; track jt.jobTypeId) {
                <option [ngValue]="jt.jobTypeId">{{ jt.jobTypeName }}</option>
              }
            </select>
          </div>
          <div class="col-md-2">
            <label class="field-label">Customer</label>
            <select class="field-input field-select"
              [ngModel]="customerId()"
              (ngModelChange)="customerId.set($event); onFieldChange()">
              <option [ngValue]="null">— Select —</option>
              @for (c of svc.referenceData()?.customers ?? []; track c.customerId) {
                <option [ngValue]="c.customerId">{{ c.name }}</option>
              }
            </select>
          </div>
          <div class="col-md-2">
            <label class="field-label">Billing Type</label>
            <select class="field-input field-select"
              [ngModel]="billingTypeId()"
              (ngModelChange)="billingTypeId.set($event); onFieldChange()">
              <option [ngValue]="undefined">— Select —</option>
              @for (bt of svc.referenceData()?.billingTypes ?? []; track bt.billingTypeId) {
                <option [ngValue]="bt.billingTypeId">{{ bt.name }}</option>
              }
            </select>
          </div>
        </div>
      </div>
    }

  </div>
}
