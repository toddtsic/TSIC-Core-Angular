@if (svc.mobileStore()) {
  <div class="tab-panel">
    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-phone me-2"></i>Mobile Features</h6>

      <div class="toggle-row" [class.is-on]="tsicEventsEnabled()" [class.is-off]="!tsicEventsEnabled()">
        <label class="toggle-control">
          <input type="checkbox"
            [ngModel]="tsicEventsEnabled()"
            (ngModelChange)="tsicEventsEnabled.set($event); onFieldChange()" />
          <span class="field-label">TSIC-Events Enabled</span>
        </label>
        <span class="toggle-tip">
          @if (tsicEventsEnabled()) {
            This event is visible in the TSIC-Events mobile app.
          } @else {
            This event is hidden from the TSIC-Events mobile app.
          }
        </span>
      </div>

      <div class="field-check-row">
        <label class="field-check">
          <input type="checkbox"
            [ngModel]="bEnableTsicteams()"
            (ngModelChange)="bEnableTsicteams.set($event); onFieldChange()" />
          <span class="field-label">Enable TSIC Teams</span>
        </label>
        <label class="field-check">
          <input type="checkbox"
            [ngModel]="bEnableMobileRsvp()"
            (ngModelChange)="bEnableMobileRsvp.set($event); onFieldChange()" />
          <span class="field-label">Enable Mobile RSVP</span>
        </label>
        <label class="field-check">
          <input type="checkbox"
            [ngModel]="bEnableMobileTeamChat()"
            (ngModelChange)="bEnableMobileTeamChat.set($event); onFieldChange()" />
          <span class="field-label">Enable Mobile Team Chat</span>
        </label>
        <label class="field-check">
          <input type="checkbox"
            [ngModel]="bAllowMobileLogin()"
            (ngModelChange)="bAllowMobileLogin.set($event); onFieldChange()" />
          <span class="field-label">Allow Mobile Login</span>
        </label>
        <label class="field-check">
          <input type="checkbox"
            [ngModel]="bAllowMobileRegn()"
            (ngModelChange)="bAllowMobileRegn.set($event); onFieldChange()" />
          <span class="field-label">Allow Mobile Registration</span>
        </label>
      </div>

      <div class="row g-2 mt-2">
        <div class="col-md-3">
          <label class="field-label">Score Hours Past Game Eligible</label>
          <input type="number" class="field-input"
            [ngModel]="mobileScoreHoursPastGameEligible()"
            (ngModelChange)="mobileScoreHoursPastGameEligible.set($event); onFieldChange()" />
        </div>
      </div>
    </div>

    @if (svc.isSuperUser()) {
      <div class="form-section form-section--super">
        <h6 class="section-title">
          <i class="bi bi-shield-lock me-2"></i>
          Mobile Identity (SuperUser)
        </h6>
        <div class="row g-2">
          <div class="col-md-6">
            <label class="field-label">Mobile Job Code</label>
            <input type="text" class="field-input"
              [ngModel]="mobileJobName()"
              (ngModelChange)="mobileJobName.set($event); onFieldChange()" />
          </div>
        </div>
      </div>

      <div class="form-section form-section--super">
        <h6 class="section-title">
          <i class="bi bi-shield-lock me-2"></i>
          Store Settings (SuperUser)
        </h6>
        <div class="field-check-row">
          <label class="field-check">
            <input type="checkbox"
              [ngModel]="bEnableStore()"
              (ngModelChange)="bEnableStore.set($event); onFieldChange()" />
            <span class="field-label">Enable Store</span>
          </label>
          <label class="field-check">
            <input type="checkbox"
              [ngModel]="bAllowStoreWalkup()"
              (ngModelChange)="bAllowStoreWalkup.set($event); onFieldChange()" />
            <span class="field-label">Allow Store Walk-up</span>
          </label>
          <label class="field-check">
            <input type="checkbox"
              [ngModel]="benableStp()"
              (ngModelChange)="benableStp.set($event); onFieldChange()" />
            <span class="field-label">Enable STP</span>
          </label>
        </div>
        <div class="row g-2 mt-2">
          <div class="col-md-6">
            <label class="field-label">Store Contact Email</label>
            <input type="email" class="field-input"
              [ngModel]="storeContactEmail()"
              (ngModelChange)="storeContactEmail.set($event); onFieldChange()" />
          </div>
          <div class="col-12">
            <label class="field-label">Store Refund Policy</label>
            <textarea class="field-input" rows="2"
              [ngModel]="storeRefundPolicy()"
              (ngModelChange)="storeRefundPolicy.set($event); onFieldChange()"></textarea>
          </div>
          <div class="col-12">
            <label class="field-label">Store Pickup Details</label>
            <textarea class="field-input" rows="2"
              [ngModel]="storePickupDetails()"
              (ngModelChange)="storePickupDetails.set($event); onFieldChange()"></textarea>
          </div>
          <div class="col-md-4">
            <label class="field-label">Sales Tax (%)</label>
            <input type="number" class="field-input" step="0.01"
              [ngModel]="storeSalesTax()"
              (ngModelChange)="storeSalesTax.set($event); onFieldChange()" />
          </div>
          <div class="col-md-4">
            <label class="field-label">TSIC Rate (%)</label>
            <input type="number" class="field-input" step="0.01"
              [ngModel]="storeTsicrate()"
              (ngModelChange)="storeTsicrate.set($event); onFieldChange()" />
          </div>
        </div>
      </div>
    }

  </div>
}
