@if (svc.coaches()) {
  <div class="tab-panel">
    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-clipboard-check me-2"></i>Coach Settings</h6>
      <div class="row g-2">
        <div class="col-md-6">
          <fieldset class="config-fieldset">
            <legend class="field-label">Form Name</legend>
            <input type="text" class="field-input"
              [ngModel]="regformNameCoach()"
              (ngModelChange)="regformNameCoach.set($event); onFieldChange()" />
          </fieldset>
        </div>
        <div class="col-md-6">
          <fieldset class="config-fieldset">
            <legend class="field-label">Roster Visibility</legend>
            <div class="field-check-row">
              <label class="field-check">
                <input type="checkbox"
                  [ngModel]="bAllowRosterViewAdult()"
                  (ngModelChange)="bAllowRosterViewAdult.set($event); onFieldChange()" />
                <span class="field-label mb-0">Adult</span>
              </label>
              <label class="field-check">
                <input type="checkbox"
                  [ngModel]="bAllowRosterViewPlayer()"
                  (ngModelChange)="bAllowRosterViewPlayer.set($event); onFieldChange()" />
                <span class="field-label mb-0">Player</span>
              </label>
            </div>
          </fieldset>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-file-earmark-text me-2"></i>Coach Confirmation &amp; Policy</h6>
      <div class="row g-2">
        <div class="col-12">
          <label class="field-label">Confirmation Email</label>
          <ejs-richtexteditor
            [value]="adultRegConfirmationEmail()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('adultRegConfirmationEmail', $event)">
          </ejs-richtexteditor>
        </div>
        <div class="col-12">
          <label class="field-label">Confirmation On-Screen</label>
          <ejs-richtexteditor
            [value]="adultRegConfirmationOnScreen()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('adultRegConfirmationOnScreen', $event)">
          </ejs-richtexteditor>
        </div>
        <div class="col-12">
          <label class="field-label">Refund Policy</label>
          <ejs-richtexteditor
            [value]="adultRegRefundPolicy()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('adultRegRefundPolicy', $event)">
          </ejs-richtexteditor>
        </div>
        <div class="col-12">
          <label class="field-label">Release of Liability</label>
          <ejs-richtexteditor
            [value]="adultRegReleaseOfLiability()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('adultRegReleaseOfLiability', $event)">
          </ejs-richtexteditor>
        </div>
        <div class="col-12">
          <label class="field-label">Code of Conduct</label>
          <ejs-richtexteditor
            [value]="adultRegCodeOfConduct()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('adultRegCodeOfConduct', $event)">
          </ejs-richtexteditor>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-flag me-2"></i>Referee Confirmations</h6>
      <div class="row g-2">
        <div class="col-12">
          <label class="field-label">Referee Confirmation Email</label>
          <ejs-richtexteditor
            [value]="refereeRegConfirmationEmail()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('refereeRegConfirmationEmail', $event)">
          </ejs-richtexteditor>
        </div>
        <div class="col-12">
          <label class="field-label">Referee Confirmation On-Screen</label>
          <ejs-richtexteditor
            [value]="refereeRegConfirmationOnScreen()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('refereeRegConfirmationOnScreen', $event)">
          </ejs-richtexteditor>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-mortarboard me-2"></i>Recruiter Confirmations</h6>
      <div class="row g-2">
        <div class="col-12">
          <label class="field-label">Recruiter Confirmation Email</label>
          <ejs-richtexteditor
            [value]="recruiterRegConfirmationEmail()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('recruiterRegConfirmationEmail', $event)">
          </ejs-richtexteditor>
        </div>
        <div class="col-12">
          <label class="field-label">Recruiter Confirmation On-Screen</label>
          <ejs-richtexteditor
            [value]="recruiterRegConfirmationOnScreen()"
            [toolbarSettings]="rteTools"
            [height]="rteHeight"
            [enableHtmlSanitizer]="false"
            (change)="onRteChange('recruiterRegConfirmationOnScreen', $event)">
          </ejs-richtexteditor>
        </div>
      </div>
    </div>

  </div>
}
