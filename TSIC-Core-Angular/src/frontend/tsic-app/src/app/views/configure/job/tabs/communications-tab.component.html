@if (svc.communications()) {
  <div class="tab-panel">
    <div class="form-section">
      <h6 class="section-title"><i class="bi bi-envelope-at me-2"></i>Email Settings</h6>
      <div class="row g-2">
        <div class="col-md-6">
          <label class="field-label">From Display Name</label>
          <input type="text" class="field-input"
            [ngModel]="displayName()"
            (ngModelChange)="displayName.set($event); onFieldChange()" />
        </div>
        <div class="col-md-6">
          <label class="field-label">Registration Form From Address</label>
          <input type="email" class="field-input"
            [ngModel]="regFormFrom()"
            (ngModelChange)="regFormFrom.set($event); onFieldChange()" />
        </div>
        <div class="col-md-6">
          <label class="field-label">CC Addresses</label>
          <input type="text" class="field-input"
            [ngModel]="regFormCcs()"
            (ngModelChange)="regFormCcs.set($event); onFieldChange()" />
        </div>
        <div class="col-md-6">
          <label class="field-label">BCC Addresses</label>
          <input type="text" class="field-input"
            [ngModel]="regFormBccs()"
            (ngModelChange)="regFormBccs.set($event); onFieldChange()" />
        </div>
        <div class="col-md-6">
          <label class="field-label">Reschedule Email List</label>
          <input type="text" class="field-input"
            [ngModel]="rescheduleemaillist()"
            (ngModelChange)="rescheduleemaillist.set($event); onFieldChange()" />
        </div>
        <div class="col-md-6">
          <label class="field-label">Always Copy Email List</label>
          <input type="text" class="field-input"
            [ngModel]="alwayscopyemaillist()"
            (ngModelChange)="alwayscopyemaillist.set($event); onFieldChange()" />
        </div>
        <div class="col-12">
          <label class="field-check">
            <input type="checkbox"
              [ngModel]="bDisallowCcplayerConfirmations()"
              (ngModelChange)="bDisallowCcplayerConfirmations.set($event); onFieldChange()" />
            <span class="field-label">Disallow CC Player Confirmations</span>
          </label>
        </div>
      </div>
    </div>
  </div>
}
