<div class="jl">

	<!-- ══════════════════════════════════════════════════
	     INITIAL LOAD — one big centered spinner masks the
	     page while job metadata + bulletins settle, so the
	     landing reveals all at once instead of painting the
	     banner first and dribbling bulletins in seconds later.
	     Opaque overlay (content renders underneath so the
	     reveal-cascade observer still attaches on mount).
	     ══════════════════════════════════════════════════ -->
	@if (loading()) {
		<div class="jl-loading" role="status" aria-live="polite">
			<div class="jl-loading__inner">
				<div class="jl-loading__spinner" aria-hidden="true"></div>
				<p class="jl-loading__label">Loading…</p>
			</div>
		</div>
	}

	@if (isSuperseded()) {

		<!-- ══════════════════════════════════════════════════
		     SUPERSEDED — entire landing collapses to a single
		     callout redirecting to the live later-year sibling.
		     ══════════════════════════════════════════════════ -->
		<section class="jl-superseded">
			<div class="jl-container jl-superseded__inner">
				<p class="jl-superseded__msg">This event has concluded</p>
				<button type="button" class="jl-superseded__cta" (click)="goToSupersedingEvent()">
					<span>Register for {{ supersedingName() }}</span>
					<i class="bi bi-arrow-right" aria-hidden="true"></i>
				</button>
			</div>
		</section>

	} @else {

		<!-- ══════════════════════════════════════════════════
		     BANNER — widget self-contains via rounded corners +
		     shadow; we just cap its width on wide screens.
		     ══════════════════════════════════════════════════ -->
		<app-client-banner></app-client-banner>


		<!-- ══════════════════════════════════════════════════
		     CONCLUDED — the last scheduled game has passed. Inline,
		     non-collapsing notice (no redirect; the schedule/rosters
		     remain reachable below). Decoupled from supersession —
		     fires on time alone, no later-year sibling required.
		     ══════════════════════════════════════════════════ -->
		@if (isConcluded()) {
			<div class="jl-concluded" role="status">
				<i class="bi bi-flag-fill" aria-hidden="true"></i>
				<span class="jl-concluded__text">This event has concluded</span>
			</div>
		}


		<!-- ══════════════════════════════════════════════════
		     STATUS LINE — phase-aware public deadline line
		     (event-begins / registration closes / opens), tone
		     softens with distance.
		     ══════════════════════════════════════════════════ -->
		@if (heroStatus(); as cd) {
			<div class="jl-countdown" [class.jl-countdown--upcoming]="cd.tone === 'upcoming'" role="status">
				<span class="jl-countdown__dot" aria-hidden="true"></span>
				<span class="jl-countdown__text">{{ cd.text }}</span>
			</div>
		}


		<!-- ══════════════════════════════════════════════════
		     ACTION HUB (hero strip) — grounded landing CTAs from
		     the live pulse. The unified menu's LandingCta placement;
		     rendered bare (hero only) so the global header chrome is
		     untouched for now.
		     ══════════════════════════════════════════════════ -->
		@if (heroActions().length) {
			<app-action-hub [bare]="true" [heroActions]="heroActions()" />
		}

		<!-- ══════════════════════════════════════════════════
		     REGISTRATION PANEL — compound viewer capturing the
		     "Player & Coach Registration and Waiver Wizard"
		     bulletin. Conditionally assembles self-roster links,
		     the featured self-roster-update (change team/uniform/
		     cancel), and public rosters. Supersedes the absorbed
		     strip cards while shown; self-hides when empty.
		     ══════════════════════════════════════════════════ -->
		@if (showRegistrationPanel()) {
			<app-registration-panel [jobPath]="activeJobPath()" [allowedKeys]="allowedCtaKeys()" />
		}

		<!-- ══════════════════════════════════════════════════
		     GAME-DAY PANEL — rich, self-assembling capture of the
		     "Schedules Now Available!" bulletin. Lights up on the
		     SAME isolated signal as the View Schedule card (schedule
		     published AND games exist); promotes the web schedule +
		     the free TSIC-Events app (device-aware). Supersedes the
		     plain View Schedule card while shown.
		     ══════════════════════════════════════════════════ -->
		@if (showGameDayPanel()) {
			<app-game-day-panel [jobPath]="activeJobPath()" [live]="!isConcluded()"
				[jobId]="jobId()" [showClock]="showInlineClock()" />
		}

		<!-- ══════════════════════════════════════════════════
		     BULLETINS — full-viewport-width publication paper
		     floating on the atmospheric page background. The section
		     header carries the title plus, when in-season, the
		     next-game countdown flush right.
		     ══════════════════════════════════════════════════ -->
		<section class="jl-bulletins">
			<div class="jl-bulletins__inner">
				<header class="jl-bulletins__header">
					<h2 class="jl-bulletins__title">
						<span class="jl-gradient-text">News &amp; Updates</span>
					</h2>
				</header>
				<div class="reveal reveal-delay-1">
					<app-bulletins></app-bulletins>
				</div>
			</div>
		</section>

	}

</div>
