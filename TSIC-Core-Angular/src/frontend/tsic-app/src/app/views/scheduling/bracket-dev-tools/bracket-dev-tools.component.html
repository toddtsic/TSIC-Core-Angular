@if (isSandbox && divId()) {
	<app-dev-seed-strip
		title="Bracket Test Tools"
		[actions]="actions"
		[busy]="busy()"
		[result]="result()"
		[errorMessage]="errorMessage()"
		confirmTitle="Clear scores &amp; reset bracket?"
		[confirmMessage]="clearMessage()"
		(action)="onAction($event)">
		Exercise seeding &amp; advancement on
		<strong>{{ divisionName() || 'this division' }}</strong>
		with real data. Then open <em>View Schedule → Standings / Brackets</em> to watch the effect.
	</app-dev-seed-strip>
}
