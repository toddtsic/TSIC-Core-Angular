<tsic-dialog [open]="true" size="sm" (requestClose)="cancelled.emit()">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Schedule: <span class="scope-name">{{ scopeLabel() }}</span></h5>
            <button type="button" class="btn-close" (click)="cancelled.emit()"></button>
        </div>
        <div class="modal-body">

            <!-- Action dropdown -->
            <label class="form-label form-label-sm fw-semibold mb-1">What do you want to do?</label>
            <select class="form-select form-select-sm"
                    [value]="selectedAction() ?? ''"
                    (change)="onActionChange($any($event.target).value)">
                <option value="" disabled>Choose an action...</option>
                @for (opt of options(); track opt.value) {
                    <option [value]="opt.value">{{ opt.label }}</option>
                }
            </select>

            <!-- Description of selected action -->
            @if (selectedOption()) {
                <div class="action-description" [class.action-description--danger]="isDanger()">
                    <i class="bi" [ngClass]="selectedOption()!.icon"></i>
                    <span>{{ selectedOption()!.description }}</span>
                </div>
            }

            <!-- Day picker (delete-only with existing games) -->
            @if (showDayPicker()) {
                <div class="day-picker-section">
                    <label class="form-label form-label-sm fw-semibold mb-1">Filter by Day</label>
                    <select class="form-select form-select-sm"
                            [value]="filterDate()"
                            (change)="onFilterDateChange($any($event.target).value)">
                        <option value="">All Days</option>
                        @for (gd of gameDates(); track gd.date) {
                            <option [value]="gd.date">{{ gd.date | date:'EEEE MMM d' }} ({{ gd.gameCount }} games)</option>
                        }
                    </select>
                </div>
            }

            <!-- Confirmation checkbox (only after selecting an action) -->
            @if (hasSelection()) {
                <div class="confirm-section">
                    <label class="confirm-label">
                        <input type="checkbox"
                               class="form-check-input"
                               [checked]="confirmed()"
                               (change)="toggleConfirm()">
                        <span class="confirm-text">
                            I understand this is <strong>not reversible</strong>.
                        </span>
                    </label>
                </div>
            }

        </div>
        <div class="modal-footer">
            <button class="btn btn-sm btn-outline-secondary" (click)="cancelled.emit()">Cancel</button>
            <button class="btn btn-sm"
                    [ngClass]="isDanger() ? 'btn-danger' : 'btn-primary'"
                    [disabled]="!hasSelection() || !confirmed()"
                    (click)="onConfirm()">
                <i class="bi me-1" [ngClass]="selectedOption()?.icon"></i>
                {{ actionLabel() }}
            </button>
        </div>
    </div>
</tsic-dialog>
