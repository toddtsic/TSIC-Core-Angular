@if (hasContent()) {
	<div class="sb" aria-label="Smart Bulletins — updated automatically">

		<!-- Event Status leads — it's the lifecycle headline/context for the page. -->
		@if (showEventStatus()) {
			<app-event-status />
		}

		@if (showRegistration()) {
			<app-registration-panel [jobPath]="jobPath()" [allowedKeys]="allowedKeys()" [publicView]="publicView()" />
		}

		@if (showGameDay()) {
			<app-game-day-panel [jobPath]="jobPath()" [live]="live()"
				[jobId]="jobId()" [showClock]="showClock()" />
		}

		<!-- Store rides in the band on its own. (Public Rosters now lives as a section
		     INSIDE the Registration panel above, not as a standalone card here.) -->
		@if (showStore()) {
			<div class="sb__card-wrap">
				<app-smart-marker text="The store shows whatever items are live right now — it appears and updates on its own." />
				<a class="sb__card" [routerLink]="storeLink()">
					<span class="sb__card-icon" aria-hidden="true"><i class="bi bi-bag"></i></span>
					<span class="sb__card-text">
						<strong>Team Store</strong>
						<small>Official gear &amp; merchandise</small>
					</span>
					<i class="bi bi-arrow-right sb__card-go" aria-hidden="true"></i>
				</a>
			</div>
		}

	</div>
}
