@if (view(); as v) {
	<section class="es" aria-label="Event status">
		<div class="es__inner">
			<app-smart-marker text="This message updates itself as the event moves through its season — opening, closing, and wrapping up on its own." />
			<span class="es__icon" aria-hidden="true"><i class="bi {{ v.icon }}"></i></span>
			<div class="es__text">
				<h3 class="es__headline">{{ v.headline }}</h3>
				<p class="es__sub">{{ v.sub }}</p>
			</div>
		</div>
	</section>
}
