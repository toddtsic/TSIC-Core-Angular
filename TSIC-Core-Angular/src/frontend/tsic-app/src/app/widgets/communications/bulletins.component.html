@if (bulletins() && bulletins().length > 0) {
<div class="bulletins">
    @for (bulletin of bulletins(); track bulletin.bulletinId) {
    <article class="bulletin">
        @if (isAdmin()) {
        <button type="button" class="bulletin-hide"
                (click)="deactivate(bulletin, $event)"
                [disabled]="deactivatingId() === bulletin.bulletinId"
                title="Hide this bulletin (set inactive)"
                aria-label="Hide this bulletin">
            <i class="bi bi-eye-slash" aria-hidden="true"></i>
        </button>
        }
        <div class="bulletin-content">
            @if (bulletin.title) {
            <h2 class="bulletin-title">{{ bulletin.title }}</h2>
            }

            <div class="bulletin-body" appInternalLink [jobPath]="jobPath()">
                <div [innerHTML]="bulletin.text | translateLegacyUrls:jobPath()"></div>
            </div>
        </div>
    </article>
    }
</div>
}

@if (loading()) {
<div class="bulletins-loading">
    <div class="spinner"></div>
    <p>Loading bulletins...</p>
</div>
}

@if (error()) {
<div class="bulletins-error">
    <p class="error-message">{{ error() }}</p>
</div>
}
