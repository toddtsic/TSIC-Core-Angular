<!-- ✨ SMART band — the self-assembling, always-current bulletins. ALWAYS pinned
     above the director's hand-authored ones (never interleaved). Self-hides when
     empty. -->
@if (smart()) {
<!-- The band carries its own "Happening Now" lead-in (with the live game clock
     flush-right), parallel to the News & Updates divider below. -->
<app-smart-bulletins [jobPath]="jobPath()" />
}

@if (bulletins() && bulletins().length > 0) {
<!-- Divider: the smart band above is the system's; below is the organizer's. -->
<div class="bulletins-sep">
    <span class="bulletins-sep__label"><i class="bi bi-megaphone-fill" aria-hidden="true"></i> News &amp; Updates</span>
</div>
<div class="bulletins">
    @for (bulletin of bulletins(); track bulletin.bulletinId) {
    <article class="bulletin">
        @if (isAdmin()) {
        <div class="bulletin-admin-actions">
            <button type="button" class="bulletin-admin-btn"
                    (click)="edit(bulletin, $event)"
                    title="Edit this bulletin"
                    aria-label="Edit this bulletin">
                <i class="bi bi-pencil" aria-hidden="true"></i>
            </button>
            <button type="button" class="bulletin-admin-btn bulletin-admin-btn--hide"
                    (click)="deactivate(bulletin, $event)"
                    [disabled]="deactivatingId() === bulletin.bulletinId"
                    title="Hide this bulletin (set inactive)"
                    aria-label="Hide this bulletin">
                <i class="bi bi-eye-slash" aria-hidden="true"></i>
            </button>
        </div>
        }
        <div class="bulletin-content">
            @if (bulletin.title) {
            <h2 class="bulletin-title">{{ bulletin.title }}</h2>
            }

            <div class="bulletin-body" appInternalLink [jobPath]="jobPath()">
                <div [innerHTML]="bulletin.text | translateLegacyUrls:jobPath()"></div>
            </div>
        </div>
    </article>
    }
</div>
}

@if (loading()) {
<div class="bulletins-loading">
    <div class="spinner"></div>
    <p>Loading bulletins...</p>
</div>
}

@if (error()) {
<div class="bulletins-error">
    <p class="error-message">{{ error() }}</p>
</div>
}
