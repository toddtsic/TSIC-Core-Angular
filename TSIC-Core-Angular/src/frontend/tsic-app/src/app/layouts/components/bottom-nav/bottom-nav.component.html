@if (navVisible()) {
<div class="bottom-nav d-lg-none" appScrollFade>
<nav class="bottom-nav__scroller" aria-label="Mobile navigation">

    @for (item of tabItems(); track item.navItemId) {
        @if (isExternalLink(item)) {
        <a class="bottom-nav__tab"
            [href]="item.navigateUrl!"
            [target]="item.target || '_self'">
            <i class="bi bi-{{ getIcon(item) }} bottom-nav__icon" aria-hidden="true"></i>
            <span class="bottom-nav__label">{{ item.text }}</span>
        </a>
        } @else if (getLink(item)) {
        <a class="bottom-nav__tab"
            [routerLink]="getLink(item)"
            routerLinkActive="bottom-nav__tab--active"
            [routerLinkActiveOptions]="{ exact: false }">
            <i class="bi bi-{{ getIcon(item) }} bottom-nav__icon" aria-hidden="true"></i>
            <span class="bottom-nav__label">{{ item.text }}</span>
        </a>
        } @else {
        <!-- Category header (no direct route) — opens a focused sheet of its children -->
        <button type="button" class="bottom-nav__tab"
            [class.bottom-nav__tab--active]="isCategoryOpen(item)"
            (click)="openCategory(item)"
            aria-haspopup="true" [attr.aria-expanded]="isCategoryOpen(item)"
            [attr.aria-label]="item.text + ' menu'">
            <i class="bi bi-{{ getIcon(item) }} bottom-nav__icon" aria-hidden="true"></i>
            <span class="bottom-nav__label">{{ item.text }}</span>
        </button>
        }
    }

</nav>
</div>
}
