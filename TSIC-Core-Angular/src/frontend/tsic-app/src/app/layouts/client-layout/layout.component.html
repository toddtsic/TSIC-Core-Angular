<div class="layout-wrapper">
  <!-- Top bar — full width across the shell -->
  <header class="tsic-header">
    <app-client-header-bar></app-client-header-bar>
  </header>

  <!-- Body row: admin sidebar (desktop) sits left of the scrolling content.
       client-menu renders the vertical rail on lg+ for admins, and the
       position:fixed mobile offcanvas regardless. On mobile the rail is
       d-none, so this row is just <main> full width. -->
  <div class="layout-body" [class.layout-body--horizontal]="navLayout() === 'horizontal'">
    <app-client-menu></app-client-menu>

    <!-- Main Content (scroll container) -->
    <main class="container-fluid pb-2 pb-md-4">
      <div class="row">
        <!-- Content Area -->
        <div class="col-12">
          <router-outlet></router-outlet>
        </div>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <app-client-footer-bar></app-client-footer-bar>
</div>

<!-- Scroll to Top Button -->
<app-scroll-to-top></app-scroll-to-top>

<!-- Mobile Bottom Navigation (position:fixed, no layout impact) -->
<app-bottom-nav></app-bottom-nav>
